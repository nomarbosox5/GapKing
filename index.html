<script>
const ODDS_KEY = '75fbd1947a7dec109b7573b6951a65aa';
const THRESH = 8.0;

let selectedGamePk = null;
let selectedTeamName = null;
let lastPlayIndex = null;
let lastOddsPrice = 0;
let gumboTimer = null;
let oddsTimer = null;

function calculateImpliedProb(odds) {
  if (!odds || odds === 0) return 0;
  // Handle American Odds conversion to percentage
  return odds > 0 ? (100 / (odds + 100)) * 100 : (Math.abs(odds) / (Math.abs(odds) + 100)) * 100;
}

async function fetchSchedule() {
  try {
    const r = await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1');
    const d = await r.json();
    const games = d.dates[0]?.games || [];
    const grid = document.getElementById('city-grid');
    grid.innerHTML = '';
    games.forEach(g => {
      const card = document.createElement('div');
      const isLive = g.status.abstractGameState === 'Live';
      card.className = `city-card ${isLive ? 'state-live' : ''}`;
      card.innerHTML = `<div class="city-name" style="font-weight:700">${g.teams.home.team.name}</div><div style="font-size:11px; color:var(--sub)">${isLive ? 'LIVE' : 'UPCOMING'}</div>`;
      card.onclick = () => startWatching(g);
      grid.appendChild(card);
    });
  } catch(e) { console.error("Schedule Error", e); }
}

async function startWatching(game) {
  selectedGamePk = game.gamePk;
  selectedTeamName = game.teams.home.team.name;
  document.getElementById('w-team-name').textContent = selectedTeamName;
  document.getElementById('screen-pick').classList.remove('active');
  document.getElementById('screen-watch').classList.add('active');
  
  updateOdds(); 
  gumboTimer = setInterval(updateGumbo, 1000); 
  oddsTimer = setInterval(updateOdds, 60000); // 1 minute pull
}

async function updateGumbo() {
  try {
    const r = await fetch(`https://statsapi.mlb.com/api/v1.1/game/${selectedGamePk}/feed/live?t=${Date.now()}`);
    const d = await r.json();
    const currentPlay = d.liveData.plays.currentPlay;
    const homeWinProb = currentPlay?.about?.homeWinProbability || 50;

    if (currentPlay?.about?.atBatIndex !== lastPlayIndex) {
      lastPlayIndex = currentPlay?.about?.atBatIndex;
      updateOdds(); // Force odds refresh on every hit
    }

    const statusEl = document.getElementById('team-status');
    const isTop = currentPlay?.about?.isTopInning;
    statusEl.textContent = isTop ? 'PITCHING' : 'HITTING';
    statusEl.className = `status-tag ${isTop ? 'pitching' : 'hitting'}`;

    const bookProb = calculateImpliedProb(lastOddsPrice);
    const gap = homeWinProb - bookProb;

    // UI Updates
    document.getElementById('n-mlb').textContent = homeWinProb.toFixed(1) + '%';
    document.getElementById('n-book').textContent = bookProb > 0 ? bookProb.toFixed(1) + '%' : 'FETCHING...';
    document.getElementById('n-gap').textContent = bookProb > 0 ? (gap > 0 ? '+' : '') + gap.toFixed(1) + '%' : '—';
    document.getElementById('b-mlb').style.width = homeWinProb + '%';
    document.getElementById('p-mlb').textContent = homeWinProb.toFixed(1) + '%';
    document.getElementById('b-book').style.width = bookProb + '%';
    document.getElementById('p-book').textContent = bookProb > 0 ? bookProb.toFixed(1) + '%' : 'WAITING...';

    const sigBox = document.getElementById('sig-box');
    if (bookProb > 0 && gap >= THRESH) {
      sigBox.className = 'sig-box buy';
      document.getElementById('sig-lbl').textContent = '🚨 BUY SIGNAL';
      document.getElementById('sig-action').textContent = `BET ${selectedTeamName}`;
    } else {
      sigBox.className = 'sig-box idle';
      document.getElementById('sig-lbl').textContent = 'MONITORING';
      document.getElementById('sig-action').textContent = '1s Gumbo Scan Active';
    }
  } catch (e) { console.error(e); }
}

async function updateOdds() {
  try {
    // ── THE CORS FIX ──
    const target = `https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${ODDS_KEY}&regions=us&markets=h2h`;
    const proxiedUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
    
    const r = await fetch(proxiedUrl);
    const raw = await r.json();
    const d = JSON.parse(raw.contents); // AllOrigins wraps the data in a 'contents' string
    
    const game = d.find(o => o.home_team === selectedTeamName || o.away_team === selectedTeamName);
    if (game) {
      const outcome = game.bookmakers[0]?.outcomes.find(out => out.name === selectedTeamName);
      lastOddsPrice = outcome?.price || 0;
      console.log("Odds Updated:", lastOddsPrice);
    }
  } catch (e) { console.error("Odds API Error", e); }
}

function goBack() {
  clearInterval(gumboTimer); clearInterval(oddsTimer);
  document.getElementById('screen-watch').classList.remove('active');
  document.getElementById('screen-pick').classList.add('active');
}

fetchSchedule();
</script>
