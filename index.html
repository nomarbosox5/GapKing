<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gap King | MLB Live</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f2f7;--surface:#fff;--border:#dde1ec;--text:#0f1120;--sub:#5a6180;--muted:#9096b0;--dim:#e8eaf4;
  --green:#00a85a;--gl:#e6f7ef;--gb:#7dd4aa;
  --red:#e8203a;--rl:#fef0f2;--rb:#f5aab5;
  --blue:#2563eb;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text)}
.screen{display:none;height:100vh;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px 12px;flex-shrink:0}
.hdr-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;justify-content: space-between;}
.hdr-name{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.03em}

/* WATCH SCREEN */
.watch-body{flex:1;overflow-y:auto;padding:15px}
.sig-box{border-radius:14px;padding:16px;flex-shrink:0;margin-bottom:10px}
.sig-box.idle{background:var(--surface);border:1.5px solid var(--border)}
.sig-box.buy{background:var(--rl);border:2px solid var(--rb);animation:flash .5s}
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(232,32,58,.4)}100%{box-shadow:0 0 0 20px rgba(232,32,58,0)}}

.num-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 11px;text-align:center}
.nv{font-family:var(--mono);font-size:19px;font-weight:700}
.gap-fill{height:100%;border-radius:4px;transition:width .6s ease;background:var(--blue)}

.city-scroll{flex:1;overflow-y:auto;padding:10px}
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.city-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;overflow:hidden}
.city-card.state-live{border-color:var(--gb);background:linear-gradient(135deg,var(--gl) 0%,#fff 60%)}
.city-card.state-live::before{content:'';position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--green);animation:gpulse 1.4s infinite}
@keyframes gpulse{0%,100%{box-shadow:0 0 0 0 rgba(0,168,90,.5)}70%{box-shadow:0 0 0 6px rgba(0,168,90,0)}}

.btn-sync{background:var(--blue);color:#fff;border:none;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;}
.error-msg{color:var(--red); font-size:12px; margin-top:8px;}
</style>
</head>
<body>

<div class="screen active" id="screen-pick">
  <div class="hdr">
    <div class="hdr-top"><div class="hdr-name">👑 Gap King</div></div>
    <div style="font-size:12px; color:var(--muted)">Tap a live game to start 1s tracking</div>
  </div>
  <div class="city-scroll">
    <div class="city-grid" id="city-grid">
      <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)">Loading MLB games...</div>
    </div>
  </div>
</div>

<div class="screen" id="screen-watch">
  <div class="hdr" style="display:flex; justify-content: space-between; align-items: center;">
    <button onclick="goBack()" style="background:none; border:none; color:var(--blue); font-weight:700; cursor:pointer;">‹ Back</button>
    <div id="w-team-name" style="font-weight:800; font-size:14px;">Team Name</div>
    <button class="btn-sync" onclick="forceUpdate()">SYNC NOW</button>
  </div>

  <div class="watch-body">
    <div class="sig-box idle" id="sig-box">
      <div id="sig-lbl" style="font-size:10px; font-weight:800; margin-bottom:5px; color:var(--muted); text-transform:uppercase;">Scanning Feed</div>
      <div id="sig-action" style="font-size:18px; font-weight:800; margin-bottom:8px;">1s MLB Gumbo Active</div>
      <div id="sig-why" style="font-size:12px; color:var(--sub); line-height:1.4;">Odds refresh every 60s or on hits.</div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
      <div class="num-card"><div class="nv" id="n-mlb">—</div><div style="font-size:10px; color:var(--muted)">MLB Win%</div></div>
      <div class="num-card"><div class="nv" id="n-book">—</div><div style="font-size:10px; color:var(--muted)">Book Prob</div></div>
      <div class="num-card"><div class="nv" id="n-gap">—</div><div style="font-size:10px; color:var(--muted)">Gap (8%)</div></div>
    </div>

    <div style="background:var(--surface); border-radius:12px; padding:15px; border:1px solid var(--border);">
       <div style="margin-bottom:15px;">
          <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;"><span>MLB Reality (1s)</span><span id="p-mlb">0%</span></div>
          <div style="height:6px; background:var(--dim); border-radius:4px;"><div id="b-mlb" class="gap-fill" style="width:0%"></div></div>
       </div>
       <div>
          <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;"><span>Book Implied (1m)</span><span id="p-book">0%</span></div>
          <div style="height:6px; background:var(--dim); border-radius:4px;"><div id="b-book" class="gap-fill" style="width:0%; background:var(--muted)"></div></div>
       </div>
    </div>

    <div id="error-log" class="error-msg"></div>
  </div>
</div>

function logError(msg) {
  console.error(msg);
  document.getElementById('error-log').textContent = msg;
}

// Simple fetch with timeout and better error handling
async function safeFetch(url, options = {}) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    
    const res = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(timeout);
    
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res;
  } catch (e) {
    logError(`Fetch failed: ${e.message} (${url})`);
    throw e;
  }
}

function calculateImpliedProb(odds) {
  if (!odds || odds === 100) return 50;
  return odds > 0 ? (100 / (odds + 100)) : (Math.abs(odds) / (Math.abs(odds) + 100)) * 100;
}

async function fetchSchedule() {
  const grid = document.getElementById('city-grid');
  grid.innerHTML = '<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)">Syncing with MLB...</div>';
  
  try {
    const r = await safeFetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1');
    const d = await r.json();
    const games = d.dates?.[0]?.games || [];
    
    grid.innerHTML = '';
    
    if (games.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)">No games today</div>';
      return;
    }
    
    games.forEach(g => {
      const card = document.createElement('div');
      const isLive = g.status?.abstractGameState === 'Live';
      const homeName = g.teams.home.team.name;
      
      card.className = `city-card ${isLive ? 'state-live' : ''}`;
      card.innerHTML = `
        <div style="font-weight:700">${homeName}</div>
        <div style="font-size:11px; color:var(--sub)">${isLive ? '🔴 LIVE' : 'Upcoming'}</div>
      `;
      card.onclick = () => startWatching(g);
      grid.appendChild(card);
    });
  } catch (e) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--red)">Failed to load games. Check console.</div>';
  }
}

async function startWatching(game) {
  selectedGamePk = game.gamePk;
  selectedTeamName = game.teams.home.team.name;
  
  document.getElementById('w-team-name').textContent = selectedTeamName;
  document.getElementById('screen-pick').classList.remove('active');
  document.getElementById('screen-watch').classList.add('active');
  
  document.getElementById('error-log').textContent = '';
  
  forceUpdate();
  gumboTimer = setInterval(updateGumbo, 1000);
  oddsTimer = setInterval(updateOdds, 60000);
}
