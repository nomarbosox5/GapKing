<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gap King | MLB Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f2f7;--surface:#fff;--border:#dde1ec;--text:#0f1120;--sub:#5a6180;--muted:#9096b0;--dim:#e8eaf4;
  --green:#00a85a;--gl:#e6f7ef;--gb:#7dd4aa;
  --red:#e8203a;--rl:#fef0f2;--rb:#f5aab5;
  --amber:#d97706;--al:#fef7e8;--ab:#f5d588;
  --blue:#2563eb;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text)}
.screen{display:none;height:100vh;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px 12px;flex-shrink:0}
.hdr-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.hdr-name{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.03em}
.hdr-sub{font-size:12px;color:var(--muted)}
.legend{display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ld-live{background:var(--green)}.ld-pre{background:var(--amber)}.ld-off{background:var(--muted)}

/* CITY GRID */
.city-scroll{flex:1;overflow-y:auto;padding:10px}
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.city-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;overflow:hidden}
.city-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.city-card:active{transform:scale(.98)}
.city-card.state-live{border-color:var(--gb);background:linear-gradient(135deg,var(--gl) 0%,#fff 60%)}
.city-card.state-live::before{content:'';position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--green);animation:gpulse 1.4s infinite}
@keyframes gpulse{0%,100%{box-shadow:0 0 0 0 rgba(0,168,90,.5)}70%{box-shadow:0 0 0 6px rgba(0,168,90,0)}}

/* WATCH SCREEN SIGNAL BOX */
.sig-box{border-radius:14px;padding:16px;flex-shrink:0;margin-bottom: 10px;}
.sig-box.idle{background:var(--surface);border:1.5px solid var(--border)}
.sig-box.buy{background:var(--rl);border:2px solid var(--rb);animation:flash .5s}
.sig-box.watch{background:var(--al);border:1.5px solid var(--ab)}
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(232,32,58,.4)}100%{box-shadow:0 0 0 20px rgba(232,32,58,0)}}

/* NUMS & BARS */
.num-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 11px;text-align: center;}
.nv{font-family:var(--mono);font-size:19px;font-weight:700}
.gap-fill{height:100%;border-radius:4px;transition:width .6s ease;background:var(--blue)}
</style>
</head>
<body>

<div class="screen active" id="screen-pick">
  <div class="hdr">
    <div class="hdr-top"><span>👑</span><div class="hdr-name">Gap King</div></div>
    <div class="hdr-sub">Select a team to track live probability gaps</div>
    <div class="legend">
      <div class="li"><div class="ld ld-live"></div><span style="color:var(--green)">Live</span></div>
      <div class="li"><div class="ld ld-pre"></div><span style="color:var(--amber)">Pre-game</span></div>
    </div>
  </div>
  <div class="city-scroll">
    <div class="city-grid" id="city-grid">
      <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)">Fetching MLB schedule...</div>
    </div>
  </div>
</div>

<div class="screen" id="screen-watch">
  <div class="hdr" style="display:flex; justify-content: space-between; align-items: center;">
    <button onclick="goBack()" style="background:none; border:none; color:var(--blue); font-weight:700; cursor:pointer;">‹ Back</button>
    <div id="w-team-name" style="font-weight:800;">Team Name</div>
    <div class="ld ld-live"></div>
  </div>

  <div class="city-scroll" style="padding:15px;">
    <div class="sig-box idle" id="sig-box">
      <div id="sig-lbl" style="font-size:11px; font-weight:800; margin-bottom:5px; color:var(--muted)">MONITORING</div>
      <div id="sig-action" style="font-size:22px; font-weight:800; margin-bottom:8px;">Analyzing...</div>
      <div id="sig-why" style="font-size:13px; color:var(--sub); line-height:1.4;">Calculating gap between MLB Gumbo and Hard Rock...</div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
      <div class="num-card"><div class="nv" id="n-mlb">—</div><div style="font-size:10px; color:var(--muted)">MLB Win%</div></div>
      <div class="num-card"><div class="nv" id="n-book">—</div><div style="font-size:10px; color:var(--muted)">Book Implied</div></div>
      <div class="num-card"><div class="nv" id="n-gap">—</div><div style="font-size:10px; color:var(--muted)">Gap (Target 8%)</div></div>
    </div>

    <div style="background:var(--surface); border-radius:12px; padding:15px; border:1px solid var(--border);">
       <div style="margin-bottom:15px;">
          <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;"><span>MLB Probability</span><span id="p-mlb">0%</span></div>
          <div style="height:8px; background:var(--dim); border-radius:4px;"><div id="b-mlb" class="gap-fill" style="width:0%"></div></div>
       </div>
       <div>
          <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;"><span>Hard Rock Implied</span><span id="p-book">0%</span></div>
          <div style="height:8px; background:var(--dim); border-radius:4px;"><div id="b-book" class="gap-fill" style="width:0%; background:var(--muted)"></div></div>
       </div>
    </div>
  </div>
</div>

<script>
const ODDS_API_KEY = '75fbd1947a7dec109b7573b6951a65aa'; // Ready for secret
const THRESHOLD = 8.0;

let selectedGamePk = null;
let selectedTeamName = null;
let pollInterval = null;

// Convert American Odds to Implied Probability
function calculateImpliedProb(odds) {
  if (!odds) return 0;
  return odds > 0 ? (100 / (odds + 100)) * 100 : (Math.abs(odds) / (Math.abs(odds) + 100)) * 100;
}

async function fetchSchedule() {
  const response = await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1');
  const data = await response.json();
  const games = data.dates[0]?.games || [];
  const grid = document.getElementById('city-grid');
  grid.innerHTML = '';

  games.forEach(game => {
    const card = document.createElement('div');
    const isLive = game.status.abstractGameState === 'Live';
    card.className = `city-card ${isLive ? 'state-live' : 'state-pre'}`;
    card.innerHTML = `
      <div class="city-name">${game.teams.away.team.name} @ ${game.teams.home.team.name}</div>
      <div style="font-size:11px; color:var(--sub)">${isLive ? 'LIVE' : game.gameDate}</div>
    `;
    card.onclick = () => startWatching(game);
    grid.appendChild(card);
  });
}

async function startWatching(game) {
  selectedGamePk = game.gamePk;
  selectedTeamName = game.teams.home.team.name; // Logic defaults to home, can toggle
  document.getElementById('w-team-name').textContent = selectedTeamName;
  document.getElementById('screen-pick').classList.remove('active');
  document.getElementById('screen-watch').classList.add('active');
  
  updateData();
  pollInterval = setInterval(updateData, 30000);
}

async function updateData() {
  // 1. Get MLB Win Probability
  const mlbRes = await fetch(`https://statsapi.mlb.com/api/v1.1/game/${selectedGamePk}/feed/live`);
  const mlbData = await mlbRes.json();
  const mlbProb = mlbData.liveData.plays.currentPlay?.about?.homeWinProbability || 50;

  // 2. Get Odds (Simplified for UI flow)
  const oddsRes = await fetch(`https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=h2h`);
  const oddsData = await oddsRes.json();
  
  // Find current game odds
  const gameOdds = oddsData.find(o => o.home_team === selectedTeamName);
  const price = gameOdds?.bookmakers[0]?.outcomes.find(out => out.name === selectedTeamName)?.price || 0;
  const bookProb = calculateImpliedProb(price);
  const gap = mlbProb - bookProb;

  // Update UI
  document.getElementById('n-mlb').textContent = mlbProb.toFixed(1) + '%';
  document.getElementById('n-book').textContent = bookProb.toFixed(1) + '%';
  document.getElementById('n-gap').textContent = (gap > 0 ? '+' : '') + gap.toFixed(1) + '%';
  
  document.getElementById('b-mlb').style.width = mlbProb + '%';
  document.getElementById('p-mlb').textContent = mlbProb.toFixed(1) + '%';
  document.getElementById('b-book').style.width = bookProb + '%';
  document.getElementById('p-book').textContent = bookProb.toFixed(1) + '%';

  // Alert Logic
  const sigBox = document.getElementById('sig-box');
  if (gap >= THRESHOLD) {
    sigBox.className = 'sig-box buy';
    document.getElementById('sig-lbl').textContent = '🚨 BUY SIGNAL';
    document.getElementById('sig-lbl').style.color = 'var(--red)';
    document.getElementById('sig-action').textContent = `BET ${selectedTeamName}`;
    document.getElementById('sig-why').innerHTML = `Gap is <b>${gap.toFixed(1)}%</b>. MLB probability is significantly higher than market odds.`;
  } else {
    sigBox.className = 'sig-box idle';
    document.getElementById('sig-lbl').textContent = 'MONITORING';
    document.getElementById('sig-action').textContent = 'Searching for Edge...';
    document.getElementById('sig-why').textContent = `Current gap is ${gap.toFixed(1)}%. Alert fires at 8.0%.`;
  }
}

function goBack() {
  clearInterval(pollInterval);
  document.getElementById('screen-watch').classList.remove('active');
  document.getElementById('screen-pick').classList.add('active');
}

fetchSchedule();
</script>
</body>
</html>
